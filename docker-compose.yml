services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Postgres or Supabase connection string}
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    init: true
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Postgres or Supabase connection string}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    init: true
    restart: unless-stopped
    command: ["node", "scripts/docker-cron.mjs"]
    environment:
      CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET}
      CRON_TARGET_URL: http://web:3000/api/cron/cleanup-inactive-survey-data
      CRON_INTERVAL_SECONDS: ${CRON_INTERVAL_SECONDS:-3600}
    depends_on:
      web:
        condition: service_healthy
